<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>синабончики</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Заполните данные карты</h1>
  <form id="cardForm">
    <label>Номер карты:</label><br />
    <input type="text" id="cardNumber" maxlength="16" placeholder="16 цифр" /><br /><br />

    <label>Имя держателя:</label><br />
    <input type="text" id="cardName" placeholder="Ваше имя" /><br /><br />

    <label>Срок действия (ММ/ГГ):</label><br />
    <input type="text" id="validThru" maxlength="5" placeholder="ММ/ГГ" /><br /><br />

    <label>CVV:</label><br />
    <input type="text" id="cvv" maxlength="3" placeholder="3 цифры" /><br /><br />

    <button type="submit">Отправить</button>
  </form>

  <h2>Данные карты:</h2>
  <div id="result"></div>
  

  <script src="main.js"></script>
</body>
</html>
